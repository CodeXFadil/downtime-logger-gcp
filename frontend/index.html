<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Downtime Logger — W.R. Grace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #e94560;
    }
    header .tagline {
      font-size: 14px;
      color: #a8b2d8;
    }
    header .site-badge {
      margin-left: auto;
      background: #e94560;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ---- Layout ---- */
    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 24px;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }

    /* ---- Card ---- */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
      border-bottom: 2px solid #e94560;
      padding-bottom: 10px;
    }

    /* ---- Form ---- */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1a2e;
      background: #fafbfc;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover  { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ---- Toast ---- */
    #toast {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    #toast.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    #toast.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    /* ---- Records table ---- */
    .table-wrapper { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #f0f2f5;
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 2px solid #dde1ea;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: top;
    }
    tr:hover td { background: #fafbfc; }

    .site-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      background: #1a1a2e;
      color: #e94560;
    }
    .duration-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      background: #fff3cd;
      color: #856404;
    }
    .duration-badge.high {
      background: #f8d7da;
      color: #721c24;
    }

    .refresh-btn {
      background: none;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      float: right;
      margin-top: -4px;
    }
    .refresh-btn:hover { background: #f0f2f5; }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">W.R. Grace</div>
    <div class="tagline">Plant Operations — Downtime Logger</div>
  </div>
  <div class="site-badge" id="site-badge">Loading...</div>
</header>

<div class="container">

  <!-- LEFT: Submission Form -->
  <div class="card">
    <h2>Log Downtime Incident</h2>
    <form id="downtime-form">

      <div class="form-group">
        <label for="equipment_id">Equipment ID</label>
        <select id="equipment_id" required>
          <option value="">Loading...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Downtime Type</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <button type="button" id="btn-unplanned" onclick="setCategory('Unplanned')"
            style="padding:10px;border:1.5px solid #dde1ea;border-radius:8px;background:#fafbfc;cursor:pointer;font-weight:600;">
            ⚠️ Unplanned
          </button>
          <button type="button" id="btn-planned" onclick="setCategory('Planned')"
            style="padding:10px;border:1.5px solid #dde1ea;border-radius:8px;background:#fafbfc;cursor:pointer;font-weight:600;">
            📋 Planned
          </button>
        </div>
        <input type="hidden" id="category" />
      </div>

      <div class="form-group">
        <label for="reason">Reason for Downtime</label>
        <select id="reason" required>
          <option value="">— Select category first —</option>
        </select>
      </div>

      <div class="form-group">
        <label for="duration_minutes">Duration (minutes)</label>
        <input type="number" id="duration_minutes" min="1" max="9999"
               placeholder="e.g. 45" required />
      </div>

      <div class="form-group">
        <label for="shift">Shift</label>
        <select id="shift">
          <option value="">— Select shift —</option>
        </select>
      </div>

      <div class="form-group">
        <label for="operator_name">Operator Name</label>
        <input type="text" id="operator_name" placeholder="Your name" />
      </div>

      <div class="form-group">
        <label for="notes">Notes (optional)</label>
        <textarea id="notes" placeholder="Root cause, actions taken, parts replaced..."></textarea>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        Submit Downtime Record
      </button>

      <div id="toast"></div>
    </form>
  </div>

  <!-- RIGHT: Recent Records -->
  <div class="card">
    <h2>
      Recent Incidents
      <button class="refresh-btn" onclick="loadRecords()">↻ Refresh</button>
    </h2>
    <div class="table-wrapper">
      <table id="records-table">
        <thead>
          <tr>
            <th>Site</th>
            <th>Equipment</th>
            <th>Reason</th>
            <th>Duration</th>
            <th>Time (UTC)</th>
            <th>Operator</th>
          </tr>
        </thead>
        <tbody id="records-body">
          <tr><td colspan="6" class="empty-state">Loading records...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // Show which site this Container App is serving (comes from SITE_NAME env var)
  async function loadSiteInfo() {
    try {
      const res = await fetch("/api/health");
      const data = await res.json();
      document.getElementById("site-badge").textContent =
        (data.site || "Unknown Site") + " (" + (data.region || "") + ")";
    } catch {
      document.getElementById("site-badge").textContent = "Offline";
    }
  }

  // Load recent records from /records endpoint
  async function loadRecords() {
    const tbody = document.getElementById("records-body");
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Loading...</td></tr>';
    try {
      const res = await fetch("/api/records");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const records = await res.json();
      if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No records yet. Submit your first downtime incident!</td></tr>';
        return;
      }
      tbody.innerHTML = records.map(r => {
        const high = r.duration_minutes >= 120;
        const ts = r.start_time ? r.start_time.replace("T", " ").substring(0, 16) : "";
        return `<tr>
          <td><span class="site-tag">${esc(r.site_name)}</span></td>
          <td>${esc(r.equipment_id)}</td>
          <td>${esc(r.reason)}</td>
          <td><span class="duration-badge${high ? " high" : ""}">${esc(String(r.duration_minutes))} min</span></td>
          <td style="font-size:12px;color:#888;">${esc(ts)}</td>
          <td>${esc(r.operator_name)}</td>
        </tr>`;
      }).join("");
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color:#c0392b;">
        Could not load records: ${esc(err.message)}
      </td></tr>`;
    }
  }

  // Escape HTML to prevent XSS
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Master data loaded from /api/master-data on page load
  let masterData = { equipment: [], reasons: [], shifts: [] };

  async function loadMasterData() {
    try {
      const res = await fetch("/api/master-data");
      if (!res.ok) throw new Error("HTTP " + res.status);
      masterData = await res.json();

      // Populate equipment
      const equip = document.getElementById("equipment_id");
      equip.innerHTML = '<option value="">— Select equipment —</option>';
      masterData.equipment.forEach(e => {
        equip.innerHTML += `<option value="${esc(e.id)}">${esc(e.id)} — ${esc(e.name)}</option>`;
      });

      // Populate shifts
      const shiftSel = document.getElementById("shift");
      shiftSel.innerHTML = '<option value="">— Select shift —</option>';
      masterData.shifts.forEach(s => {
        shiftSel.innerHTML += `<option value="${esc(s)}">${esc(s)}</option>`;
      });
    } catch (err) {
      console.error("Failed to load master data:", err);
    }
  }

  function setCategory(cat) {
    document.getElementById("category").value = cat;

    // Style buttons
    const btnUnplanned = document.getElementById("btn-unplanned");
    const btnPlanned   = document.getElementById("btn-planned");
    if (cat === "Unplanned") {
      btnUnplanned.style.background = "#fef2f2";
      btnUnplanned.style.borderColor = "#e94560";
      btnPlanned.style.background   = "#fafbfc";
      btnPlanned.style.borderColor  = "#dde1ea";
    } else {
      btnPlanned.style.background    = "#f0f9ff";
      btnPlanned.style.borderColor   = "#0284c7";
      btnUnplanned.style.background  = "#fafbfc";
      btnUnplanned.style.borderColor = "#dde1ea";
    }

    // Filter reason dropdown by category
    const reasonSel = document.getElementById("reason");
    reasonSel.innerHTML = '<option value="">— Select reason —</option>';
    masterData.reasons
      .filter(r => r.category === cat)
      .forEach(r => {
        reasonSel.innerHTML += `<option value="${esc(r.name)}">${esc(r.name)}</option>`;
      });
  }

  // Handle form submission
  document.getElementById("downtime-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn   = document.getElementById("submit-btn");
    const toast = document.getElementById("toast");

    btn.disabled    = true;
    btn.textContent = "Saving...";
    toast.style.display = "none";

    const payload = {
      equipment_id:     document.getElementById("equipment_id").value,
      reason:           document.getElementById("reason").value,
      duration_minutes: parseInt(document.getElementById("duration_minutes").value, 10),
      category:         document.getElementById("category").value,
      shift:            document.getElementById("shift").value,
      operator_name:    document.getElementById("operator_name").value,
      notes:            document.getElementById("notes").value,
    };

    try {
      const res  = await fetch("/api/submit", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (res.ok) {
        toast.className = "success";
        toast.textContent = "✓ Record saved for " + (data.site || "site") + ". Great work!";
        toast.style.display = "block";
        // Reset form fields (keep operator name for convenience)
        document.getElementById("equipment_id").value  = "";
        document.getElementById("reason").value        = "";
        document.getElementById("duration_minutes").value = "";
        document.getElementById("notes").value         = "";
        document.getElementById("category").value = "";
        document.getElementById("shift").value    = "";
        document.getElementById("btn-unplanned").style.background = "#fafbfc";
        document.getElementById("btn-unplanned").style.borderColor = "#dde1ea";
        document.getElementById("btn-planned").style.background   = "#fafbfc";
        document.getElementById("btn-planned").style.borderColor  = "#dde1ea";
        document.getElementById("reason").innerHTML = '<option value="">— Select category first —</option>';
        loadRecords();
      } else {
        throw new Error(data.detail || "Unknown error");
      }
    } catch (err) {
      toast.className = "error";
      toast.textContent = "✗ Failed to save: " + err.message;
      toast.style.display = "block";
    } finally {
      btn.disabled    = false;
      btn.textContent = "Submit Downtime Record";
    }
  });

  // Init
  loadSiteInfo();
  loadRecords();
  loadMasterData();
  setInterval(loadRecords, 30000);
</script>

</body>
</html>
